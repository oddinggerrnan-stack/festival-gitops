apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: festivalstream-cluster-config
  namespace: argocd
spec:
  destination:
    namespace: kube-system
    server: https://kubernetes.default.svc
  project: default
  source:
    directory:
      recurse: true
    path: cluster-config
    repoURL: https://github.com/Timkoops/festivalstream
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - group: metallb.io
      kind: BGPPeer
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle
